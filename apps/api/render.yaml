services:
  - type: web
    name: hisob-api
    env: node
    region: eu-central-1
    plan: free
    buildCommand: cd ../.. && pnpm install && cd apps/api && pnpm build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
